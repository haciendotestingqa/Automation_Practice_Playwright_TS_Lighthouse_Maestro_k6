# Submit demo credentials — no launchApp; caller must open Profile with signInButton visible.
appId: app.frontrow.qa
---
- tapOn:
    id: 'profile.signInButton'
- assertVisible:
    id: 'screen.login'
- tapOn:
    id: 'login.emailInput'
- eraseText
- inputText: 'demo@frontrow.app'
- tapOn:
    id: 'login.passwordInput'
- eraseText
- inputText: 'demo1234'
- tapOn:
    id: 'login.submitButton'
- assertVisible:
    id: 'profile.signOutButton'
