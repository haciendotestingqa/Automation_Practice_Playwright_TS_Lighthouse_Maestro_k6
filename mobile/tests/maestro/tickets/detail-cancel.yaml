# Open a purchased ticket, view QR + status, cancel through the confirm dialog.
# Demo data ships with tkt_001 owned by demo user.
appId: app.frontrow.qa
---
# signOutButton is only on Profile — check there without relaunching the app.
- tapOn:
    id: 'tab.profile'
- extendedWaitUntil:
    visible:
      id: 'screen.profile'
    timeout: 10000
- runFlow:
    when:
      visible:
        id: 'profile.signInButton'
    file: ../auth/login-credentials.yaml

- tapOn:
    id: 'tab.myTickets'
- extendedWaitUntil:
    visible:
      id: 'myTickets.item.tkt_001'
    timeout: 10000

- tapOn:
    id: 'myTickets.item.tkt_001'
- extendedWaitUntil:
    visible:
      id: 'screen.ticketDetail'
    timeout: 5000

- assertVisible:
    id: 'ticketDetail.qrCode'
- assertVisible:
    id: 'ticketDetail.qrPayload'
- assertVisible:
    id: 'ticketDetail.statusPill'

- scrollUntilVisible:
    element:
      id: 'ticketDetail.cancelButton'
    direction: DOWN
    timeout: 10000
- tapOn:
    id: 'ticketDetail.cancelButton'

# Dismiss dialog — Android asserts modal testIDs; iOS taps by id (RN Modal not visible to XCUITest).
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            id: 'ticketDetail.cancelConfirmDialog'
          timeout: 2000
      - tapOn:
          id: 'ticketDetail.cancelConfirmNo'
      - extendedWaitUntil:
          notVisible:
            id: 'ticketDetail.cancelConfirmDialog'
          timeout: 2000

- runFlow:
    when:
      platform: iOS
    commands:
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          id: 'ticketDetail.cancelConfirmNo'
      - waitForAnimationToEnd:
          timeout: 2000

- scrollUntilVisible:
    element:
      id: 'ticketDetail.cancelButton'
    direction: DOWN
    timeout: 10000
- tapOn:
    id: 'ticketDetail.cancelButton'

- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            id: 'ticketDetail.cancelConfirmDialog'
          timeout: 2000
      - tapOn:
          id: 'ticketDetail.cancelConfirmYes'

- runFlow:
    when:
      platform: iOS
    commands:
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          id: 'ticketDetail.cancelConfirmYes'

- extendedWaitUntil:
    visible: 'refund pending'
    timeout: 10000
- assertNotVisible:
    id: 'ticketDetail.cancelButton'
