# End-to-end: sign in, browse to an event, buy a ticket, confirm in My Tickets.
appId: app.frontrow.qa
---
- tapOn:
    id: 'tab.events'
- extendedWaitUntil:
    visible:
      id: 'screen.events'
    timeout: 10000
- scrollUntilVisible:
    element:
      id: 'events.item.evt_005'
    direction: DOWN
    timeout: 10000
- tapOn:
    id: 'events.item.evt_005'
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: 'eventDetail.title'
    timeout: 20000

- tapOn:
    id: 'eventDetail.buyButton'
- assertVisible:
    id: 'screen.buyTicket'
- tapOn:
    id: 'buyTicket.payButton'

- assertVisible: 'Ticket purchased'

- tapOn:
    id: 'tab.myTickets'
- assertVisible:
    text: "My Tickets"
    index: 0
